version: 1.1.0
homepage: https://lordicon.com/
repository: https://github.com/lordicondev/lordicon-flutter
issue_tracker: https://github.com/lordicondev/lordicon-flutter/issues

environment:
    sdk: ^3.9.0
    flutter: ">=3.35.0"

dependencies:
    flutter:
        sdk: flutter
    lottie: ^3.3.3
    web: ^1.1.0

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^6.0.0

topics:
    - lordicon
    - lottie
    - icon
    - animation
